# Portfolio registry — the single source of truth for the profile/portfolio
# landing page. `scripts/generate_portfolio.py` reads this file, fetches live
# metadata from GitHub (stars, language, homepage, GitHub Pages URL, topics),
# and renders pages/_about/portfolio/index.md plus the featured block in README.md.
#
# To add or reorder a project: edit this file and rerun the generator. Display
# order follows the order here. Per-project fields:
#   repo:      (required) the GitHub repo name under `owner`
#   featured:  show in the homepage table + the "Featured" section (default false)
#   category:  grouping heading on the portfolio page (default "Projects")
#   blurb:     overrides the GitHub description when the upstream one is weak/empty

owner: bamr87

# Repos that should never appear in the portfolio (clones, scratch, WIP).
exclude:
  - skills-github-pages
  - zer0-pages
  - bamr87.github.io   # this site itself — linked from the profile, not the showcase
  - djangoerp          # superseded by django-fin / amrs-project (avoid duplicate Django apps)

projects:
  # ---- Featured ---------------------------------------------------------------
  - repo: it-journey
    featured: true
    category: "Learning & Docs"
    blurb: "From zero to hero — a Jekyll-powered hub of docs, tools, scripts, and interactive quests for learning IT and software craft."

  - repo: zer0-mistakes
    featured: true
    category: "Jekyll & Web"
    blurb: "A GitHub Pages-compatible Jekyll theme built on Bootstrap 5, with Docker-first development and self-healing install scripts. Powers this site."

  - repo: barodybroject
    featured: true
    category: "Apps & AI"
    blurb: "Full-stack, responsive web app with OpenAI integration — a containerized parody-news demo of AI content workflows."
    live_url: false   # barodybroject.com custom domain is currently unreachable — hide Live link until restored

  - repo: bamr87
    featured: true
    category: "Infrastructure"
    blurb: "The monorepo: a self-managing dashboard tying together my projects, docs, and automation via Git submodules."

  # ---- Jekyll & Web -----------------------------------------------------------
  - repo: bashcrawl
    category: "Learning & Docs"
    blurb: "A terminal game for learning the Linux command line by exploring a dungeon, one `cd` at a time."

  # ---- Apps & AI --------------------------------------------------------------
  - repo: aieo
    category: "Apps & AI"
    blurb: "AI Engine Optimization — tooling to optimize content for citation and discovery by AI engines."

  - repo: lawmode
    category: "Apps & AI"
    blurb: "An always-on AI legal assistant for developers."

  - repo: githubai
    category: "Apps & AI"

  - repo: ai-seed
    category: "Apps & AI"
    blurb: "Seed scaffolding for AI-first content projects."

  - repo: wtd
    category: "Apps & AI"
    blurb: "WTD (What To Do) — a recursive TODO engine that turns vague goals into actionable steps."

  - repo: django-fin
    category: "Apps & AI"
    blurb: "A Django-based finance application exploring accounting and reporting workflows."

  - repo: amrs-project
    category: "Apps & AI"
    blurb: "AMRS — a modular Django + DRF accounting & management reporting system with JWT auth and a Bootstrap 5 frontend, built to run standalone or integrate with larger ERP platforms."

  # ---- Editor tooling ---------------------------------------------------------
  - repo: vs-sonic-pi
    category: "Editor Tooling"
    blurb: "Code. Music. Live. — write and perform Sonic Pi music directly from VS Code."

  - repo: csv-vscoode
    category: "Editor Tooling"
    blurb: "A VS Code extension for working with CSV files."

  - repo: edgar-data-parse
    category: "Data"
    blurb: "Tools for parsing financial filings from the SEC's EDGAR database."

  # ---- Knowledge bases --------------------------------------------------------
  - repo: "1987"
    category: "Knowledge Bases"
    blurb: "A self-growing knowledge base about the year 1987 — history, people, and culture."

  - repo: "1990"
    category: "Knowledge Bases"
    blurb: "A self-growing knowledge base about the year 1990 — history, science, technology, arts, and society."

  - repo: "1897"
    category: "Knowledge Bases"
    blurb: "A self-growing knowledge base about the year 1897."

  - repo: "1764"
    category: "Knowledge Bases"
    blurb: "All things 1764 — history, events, and culture from the year."

  # ---- Infrastructure ---------------------------------------------------------
  - repo: README
    category: "Infrastructure"
    blurb: "Documentation engine and content hub (MkDocs) powering the monorepo's docs site."

  - repo: scripts
    category: "Infrastructure"
    blurb: "A collection of reusable Bash and Python automation scripts for the monorepo."
